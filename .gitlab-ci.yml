stages:
  - lint
  - test
  - build

variables:
  NODE_VERSION: "18"

cache:
  paths:
    - node_modules/

lint:css:
  stage: lint
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run lint:css
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

lint:html:
  stage: lint
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run lint:html
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

test:unit:
  stage: test
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run test:unit
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

test:e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  script:
    - npm ci
    - npx playwright install --with-deps
    - npm run build:all
    - npm run test:e2e
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

build:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run build:all
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
