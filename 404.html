<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page non trouv&eacute;e | INDXONE</title>
  <meta name="description" content="La page que vous cherchez n'existe pas ou a &eacute;t&eacute; d&eacute;plac&eacute;e.">
  <meta name="robots" content="noindex, follow">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #0F1923 0%, #1B2D3E 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #C9A84C, #2D5A9E);
      z-index: 10;
    }
    
    .error-container {
      text-align: center;
      color: white;
      max-width: 600px;
      width: 100%;
      z-index: 1;
    }
    
    .error-code {
      font-family: 'DM Serif Display', serif;
      font-size: 8rem;
      font-weight: 400;
      line-height: 1;
      color: rgba(201, 168, 76, 0.3);
      margin-bottom: 1rem;
    }
    
    .error-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: white;
      margin-bottom: 0.8rem;
    }
    
    .error-title em {
      color: #E8D5A0;
      font-style: italic;
    }
    
    .error-message {
      color: rgba(255, 255, 255, 0.65);
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .btn-error {
      display: inline-block;
      padding: 0.85rem 1.8rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.2s;
      font-family: 'Sora', sans-serif;
    }
    
    .btn-primary-error {
      background: #C9A84C;
      color: #0F1923;
    }
    
    .btn-primary-error:hover {
      background: #E8D5A0;
      transform: translateY(-1px);
    }
    
    .btn-secondary-error {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-secondary-error:hover {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }
    
    .error-illustration {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .suggestions {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .suggestions-title {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    
    .suggestions-list {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .suggestions-list a {
      color: rgba(201, 168, 76, 0.8);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    
    .suggestions-list a:hover {
      color: #E8D5A0;
    }
    
    .nav-logo {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 5%;
      background: rgba(15, 25, 35, 0.6);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      z-index: 9;
    }
    
    .nav-logo a {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: #fff;
      text-decoration: none;
    }
    
    .nav-logo a span {
      color: #C9A84C;
    }
    
    @media (max-width: 480px) {
      .error-code {
        font-size: 5rem;
      }
      .error-title {
        font-size: 1.5rem;
      }
      .error-actions {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="nav-logo">
    <a href="/">indx<span>ONE</span></a>
  </div>
  
  <div class="error-container" role="main" aria-labelledby="error-title">
    <div class="error-illustration" aria-hidden="true">🔍</div>
    <div class="error-code" aria-hidden="true">404</div>
    <h1 class="error-title" id="error-title">Page non trouv&eacute;<em>e</em></h1>
    <p class="error-message">
      La page que vous cherchez n'existe pas ou a peut-être été déplacée. 
      Vérifiez l'URL ou retournez à l'accueil.
    </p>
    
    <div class="error-actions">
      <a href="/" class="btn-error btn-primary-error">← Retour à l'accueil</a>
      <a href="/#contact" class="btn-error btn-secondary-error">Contactez-moi</a>
    </div>
    
    <div class="suggestions">
      <p class="suggestions-title">Pages populaires :</p>
      <div class="suggestions-list">
        <a href="/#services">Services</a>
        <a href="/projets">Projets</a>
        <a href="/collectivites">Collectivités</a>
        <a href="https://hub.indxone.com">IndxOne Hub</a>
      </div>
    </div>
  </div>
  
  <script>
    // Track 404 error (if analytics is implemented)
    if (window.location.pathname !== '/' && window.location.pathname !== '/404.html') {
      console.log('404 Error: Page not found - ' + window.location.pathname);
    }
  </script>
</body>
</html>
